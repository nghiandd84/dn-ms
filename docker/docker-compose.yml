      AUTH_DATABASE_WRITE_URL: postgresql://${POSTGRES_USER:-dn_ms}:${POSTGRES_PASSWORD:-password123}@postgres:5432/${POSTGRES_DB:-dn_ms}
      AUTH_DATABASE_SCHEME: auth
      AUTH_REDIS_URL: redis://:${REDIS_PASSWORD:-Redis!123}@redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-Rust!@App(&589)}
      JWT_MAXAGE: ${JWT_MAXAGE:-60}
      ERROR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ERROR_KAFKA_TOPIC: error_log
      RUST_LOG: ${RUST_LOG:-debug}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      HTTP_PROTOCOL: http
      CONSUL_HTTP_ADDR: http://consul:8500
    ports:
      - "5011:5011"
    depends_on:
      migrations-auth:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
