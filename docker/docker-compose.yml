version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════

  postgres:
    image: postgres:15.3-alpine
    container_name: dn-ms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dn_ms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-dn_ms}
    ports:
      - "6500:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-dn_ms}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dn-ms-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: dn-ms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dn-ms.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: ${PGADMIN_LISTEN_PORT:-80}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dn-ms-network

  redis:
    image: redis:alpine
    container_name: dn-ms-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis!123}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Redis!123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dn-ms-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dn-ms-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Redis!123}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - dn-ms-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dn-ms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dn-ms-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dn-ms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - dn-ms-network

  kafka-init-topics:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dn-ms-kafka-init-topics
    depends_on:
      kafka:
        condition: service_started
      kafka-init-topics:
        condition: service_completed_successfully
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...' &&
        cub kafka-ready -b kafka:9092 1 30 &&
        echo 'Creating topics...' &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic error_log --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic dlq --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic event_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic payment_core_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic merchant_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic fee_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic wallet_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic auth_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic notification_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic payment_stripe_topic --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic otel_logs --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic otel_traces --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic otel_metrics --partitions 3 --replication-factor 1 &&
        echo 'All topics created.'
      "
    networks:
      - dn-ms-network

  consul:
    image: hashicorp/consul:1.17
    container_name: dn-ms-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    networks:
      - dn-ms-network

  # ═══════════════════════════════════════════════════════════
  # OPENTELEMETRY COLLECTOR
  # Receives traces/logs/metrics from all microservices via OTLP
  # ═══════════════════════════════════════════════════════════

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.124.0
    container_name: dn-ms-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "55679:55679" # zPages (debug)
    depends_on:
      - kafka
    networks:
      - dn-ms-network
    restart: unless-stopped

