receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: detailed

  kafka:
    brokers: ["kafka:9092"]
    topic: "otel_logs"
    encoding: otlp_json

  kafka/traces:
    brokers: ["kafka:9092"]
    topic: "otel_traces"
    encoding: otlp_json

  kafka/metrics:
    brokers: ["kafka:9092"]
    topic: "otel_metrics"
    encoding: otlp_json

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, kafka]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, kafka/traces]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, kafka/metrics]
