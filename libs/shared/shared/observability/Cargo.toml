[package]
name = "shared-shared-observability"
edition = "2021"
version.workspace = true
authors.workspace = true
publish = false

[lib]
name = "shared_shared_observability"
path = "src/lib.rs"

[dependencies]
opentelemetry = { workspace = true, features = [ "trace"] }
opentelemetry_sdk = { workspace = true, features = ["trace", "rt-tokio"] }
opentelemetry-appender-tracing = { workspace = true }
opentelemetry-otlp = { workspace = true, features = ["trace", "http-proto", "grpc-tonic"] }
opentelemetry-stdout = { workspace = true, features = ["trace"] }
rdkafka = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-appender = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }
