[package]
name = "shared-shared-app"
edition = "2021"
version.workspace = true
authors.workspace = true
publish = false

[lib]
name = "shared_shared_app"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
axum-tracing-opentelemetry = { workspace = true }
dn-consul = { workspace = true }
dotenv = { workspace = true }
futures-util = { workspace = true }
local-ip-address  = { workspace = true }
opentelemetry = { workspace = true, features = [ "trace"] }
opentelemetry_sdk = { workspace = true, features = ["trace", "rt-tokio"] }
opentelemetry-appender-tracing = { workspace = true }
opentelemetry-otlp = { workspace = true, features = ["trace", "http-proto", "grpc-tonic"] }
opentelemetry-stdout = { workspace = true, features = ["trace"] }
rdkafka = { workspace = true }
reqwest = { workspace = true }
sea-orm = { workspace = true , features = ["sqlx-postgres"]}
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-appender = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }
utoipa = { workspace = true }
uuid = { workspace = true, features = ["fast-rng", "v4"] }

shared-shared-auth = { workspace = true }
shared-shared-config = { workspace = true }
shared-shared-data-app =  { workspace = true }
shared-shared-data-cache =  { workspace = true }
shared-shared-data-error =  { workspace = true }
shared-shared-macro = { workspace = true }
shared-shared-middleware = { workspace = true }
shared-shared-observability = { workspace = true }
