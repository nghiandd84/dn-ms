    "apps/auth-web",
    "apps/gateway", 
    "apps/notification"
 
 ]



[workspace.package]
version = "0.0.1"
authors = ["NGHIA NDD"]

[workspace.dependencies]
anyhow = { version ="1.0.100" }
arc-swap = "1.7.1"
argon2 = "0.5.3"
async-std = { version = "1", features = ["attributes"] }
async-trait = { version = "0.1.86" }
axum = { version = "0.8.0" }
axum-extra = { version = "0.8.0" }
axum-tracing-opentelemetry = { version = "0.32" }
base64 = "0.22.1"
bytes = "1.0"
chrono = { version = "0.4.39", features = ["serde"] }
clap = { version = "3.2.25", features = ["derive"] }
config = { version = "0.15.11"}
crossbeam-epoch = "0.9.18"
dashmap = "6.1.0"
dioxus = { version = "0.7.0", features = ["fullstack"] }
dioxus-i18n = { version = "0.5.0" }
dotenv = "0.15.0"
futures-util = "0.3.31"
http = { version = "1.0.0" }
http-body = { version = "1.0"}
jsonwebtoken = { version = "10.2" }
lettre = { version = "0.11"}
local-ip-address  = { version = "0.6.5"}
log = "0.4"
once_cell = "1.20.2"
opentelemetry = { version = "0.31.0" }
opentelemetry_sdk = { version = "0.31.0" }
opentelemetry-appender-tracing = { version = "0.31.0"}
opentelemetry-otlp = { version = "0.31.0", features = ["http-proto"] }
opentelemetry-semantic-conventions = { version = "0.31.0" }
opentelemetry-stdout = { version = "0.31.0", features = ["trace"] }
pcre2 = "0.2.9"
pin-project-lite = { version = "0.2" }
pingora = { version = "0.5.0", features = ["lb"] }
pingora-core = { version = "0.5.0" }
pingora-http = { version = "0.5.0" }
pingora-proxy = { version = "0.5.0" }
quote = "1.0"
rand = "0.8.5"
rdkafka = { version = "0.37.0" }
redis = { version = "0.32.7", features = ["tokio-comp", "tokio-native-tls-comp"] }
reqwest = { version = "0.12", features = ["json"] }
reqwest-middleware = { version = "0.4"}
reqwest-retry = { version = "0.7"}
rust_decimal = { version = "1.37.1" }
sea-orm = { version = "2.0.0-rc.31" }
sea-orm-migration = { version = "2.0.0-rc.31" }
serde = { version = "1.0.223", features = ["derive"] }
serde_json = "1.0.139"
serde_qs = { version = "0.15.0" }
serde_yaml = "0.9.34"
sqlx = { version = "0.8.3", features = ["tls-native-tls", "runtime-async-std", "postgres", "chrono", "uuid"] }
syn = "2.0"
thiserror = { version="2" }
time = { version="0.3.31" }
tokio = { version="1", features = ["full"] }
tower = { version="0.5" }
tower-sessions = { version="0.14.0" }
tracing = { version = "0.1.41" }
tracing-appender = { version = "0.2.4" }
tracing-opentelemetry = { version = "0.32.0"}
tracing-subscriber = { version = "0.3.17"}
unic-langid = { version = "0.9" }
url = { version = "2.5" }
utoipa = { version = "5.3.1", features = ["chrono", "axum_extras"] }
utoipa-axum = { version = "0.2" }
utoipa-swagger-ui = { version = "9.0.0", features = ["axum"] }
uuid = { version = "1.13.2", features = ["serde", "v4"] }
validator = { version = "0.20.0", features = ["derive"] }
wildmatch = "2.4.0"



shared-shared-data-app = { path = "./libs/shared/shared/data/app"}
