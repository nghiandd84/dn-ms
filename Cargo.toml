    "features/fee/stream", 

    "features/profiles/entities", 
    "features/profiles/migrations", 
    "features/profiles/model", 
    "features/profiles/repo", 
    "features/profiles/service", 

    "features/translation/entities", 
    "features/translation/migrations", 
    "features/translation/model", 
    "features/translation/repo", 
    "features/translation/service", 

    "features/notification/model", 
