    "features/email-template/remote", 

    "apis/auth", 
    "apis/profile", 
    "apis/translation",
    "apis/bakery", 
    "apis/translation", 
    "apis/email-template",
    "apis/event",
    "apis/inventory",
    "apis/booking",
    "apis/merchant",
    "apis/fee",
    "apis/notification",
    "apis/payment-core",
    "apis/paypments/stripe",
