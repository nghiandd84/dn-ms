daemon: false
error_log: /var/log/dn-gateway/error.log
pid_file: /var/run/dn-gateway.pid
upgrade_sock: /var/run/dn-gateway.sock
user: dn_gateway
group: dn_gateway
threads: 8
work_stealing: true
grace_period_seconds: 60
graceful_shutdown_timeout_seconds: 30
upstream_keepalive_pool_size: 10
upstream_connect_offload_threadpools: 2
upstream_connect_offload_thread_per_pool: 5
upstream_debug_ssl_keylog: false
gateways:
  - name: root
    bind_addresses:
      - host: 0.0.0.0
        port: 6000
      - host: 0.0.0.0
        port: 6001
      - host: 0.0.0.0
        port: 6002
    routers:
      - upstream: auth
        filter: auth_router_filter
      - upstream: app_notification
        filter: app_notification_filter
      - upstream: profile
        filter: profile_router_filter
      - upstream: translation
        filter: translation_router_filter
      - upstream: event
        filter: event_router_filter
      - upstream: inventory
        filter: inventory_router_filter
      - upstream: bakery
        filter: bakery_router_filter
      - upstream: email_template
        filter: email_template_router_filter
      
    upstreams:
      - name: bakery
        default: false
        traffic_distribution_policy: round_robin
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5201
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5202
            tls: false
            sni: null
            weight: 2
      - name: auth
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5101
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5102
            tls: false
            sni: null
            weight: 2

      - name: app_notification
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 4001
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 4002
            tls: false
            sni: null
            weight: 1

      - name: profile
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5501
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5502
            tls: false
            sni: null
            weight: 2

      - name: translation
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5601
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5602
            tls: false
            sni: null
            weight: 2

      - name: event
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5701
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5702
            tls: false
            sni: null
            weight: 2

      - name: inventory
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5801
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5802
            tls: false
            sni: null
            weight: 2

      - name: email_template
        default: false
        traffic_distribution_policy: random
        upstream_nodes:
          - address:
              host: 127.0.0.1
              port: 5301
            tls: false
            sni: null
            weight: 1
          - address:
              host: 127.0.0.1
              port: 5302
            tls: false
            sni: null
            weight: 2
      
    
    interceptors:
      # Bakery
      - name: bakery_request_id
        type: request_id
        enabled: true
        filter: bakery_router_filter
      - name: bakery_token_auth
        type: token_auth
        enabled: true
        filter: bakery_router_filter
        config:
          # verify_endpoint: http://localhost:6001/api/auth/tokens/verify
          use_auth_service: true
      - name: bakery_cors
        type: cors
        enabled: true
        filter: bakery_router_filter
        config:
          allowed_domains: mydomain.com,testdomain.com
      - name: bakery_rate_limiter
        type: rate_limiter
        enabled: true
        filter: bakery_router_filter
        config:
          # 1 req per 10 second
          capacity: 5
          refill_rate: 2
          refill_interval: 10
      # Auth
      - name: auth_request_id
        type: request_id
        enabled: true
        filter: auth_router_filter
      - name: auth_cors
        type: cors
        enabled: true
        filter: auth_router_filter
        config:
          allowed_domains: localhost
      - name: auth_token_auth
        type: token_auth
        enabled: true
        filter: auth_router_filter
        config:
          use_auth_service: true
      - name: auth_rate_limiter
        type: rate_limiter
        enabled: true
        filter: auth_router_filter
        config:
          # 1 req per 10 second
          capacity: 5
          refill_rate: 2
          refill_interval: 10
      - name: app_notification_request_id
        type: request_id
        enabled: true
        filter: app_notification_filter   
      
      # Profile
      - name: profile_cors
        type: cors
        enabled: true
        filter: profile_router_filter
        config:
          allowed_domains: localhost
      
      # Translation
      - name: translation_cors
        type: cors
        enabled: true
        filter: translation_router_filter
        config:
          allowed_domains: localhost

      # Event
      - name: event_cors
        type: cors
        enabled: true
        filter: event_router_filter
        config:
          allowed_domains: localhost

      # Inventory
      - name: inventory_cors
        type: cors
        enabled: true
        filter: translation_router_filter
        config:
          allowed_domains: localhost

      # Email Template
      - name: email_template_cors
        type: cors
        enabled: true
        filter: email_template_router_filter
        config:
          allowed_domains: localhost

    filters:
      - name: auth_router_filter
        path:
          operator: start_with
          value: /api/auth
      - name: app_notification_filter
        path:
          operator: start_with
          value: /app-notification
        timeout: 100
      - name: profile_router_filter
        path:
          operator: start_with
          value: /api/profile
      - name: translation_router_filter
        path:
          operator: start_with
          value: /api/translation

      - name: event_router_filter
        path:
          operator: start_with
          value: /api/event

      - name: inventory_router_filter
        path:
          operator: start_with
          value: /api/inventory

      - name: bakery_router_filter
        path:
          operator: start_with
          value: /api/bakery
      - name: email_template_router_filter
        path:
          operator: start_with
          value: /api/email-template
         